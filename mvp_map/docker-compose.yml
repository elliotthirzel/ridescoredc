services:
  martin:
    image: ghcr.io/maplibre/martin:1.3.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD}@db/db
      - MARTIN_CACHE_SIZE=0
    depends_on:
      - db

  db:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      # persist PostgreSQL data in a local directory outside of the docker 
      - ./pg_data:/var/lib/postgresql/data