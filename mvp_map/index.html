<!DOCTYPE html>
<html lang="en">
<head>
<title>DC Bike Safety Map</title>
<meta property="og:description" content="View bike safety in DC." />
<meta charset='utf-8'>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.css' />
<script src='https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.js'></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

  /* ── Logo box top-right ── */
  #logo-box {
    position: fixed; top: 12px; right: 12px; z-index: 900;
    background: #1a1a2e; color: #fff;
    border-radius: 8px; padding: 6px 12px;
    display: flex; align-items: center; gap: 7px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    font-size: 12px; font-weight: 600; letter-spacing: .01em;
    cursor: pointer; border: none; font-family: 'Inter', system-ui, sans-serif;
    transition: background .15s;
  }
  #logo-box:hover { background: #2d2d4e; }
  #logo-box svg { flex-shrink: 0; }

  /* ── Attribution panel ── */
  #attribution-panel {
    position: fixed; top: 50px; right: 12px;
    width: 240px;
    background: #fff;
    z-index: 800;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.14);
    padding: 18px 20px 22px;
    transform-origin: top right;
    transform: scale(0);
    opacity: 0;
    transition: transform .2s cubic-bezier(.4,0,.2,1), opacity .15s ease;
    pointer-events: none;
  }
  #attribution-panel.open {
    transform: scale(1);
    opacity: 1;
    pointer-events: auto;
  }
  #attribution-panel .panel-header {
    margin: 0 0 14px; font-size: 14px; font-weight: 600; color: #1a1a2e;
    display: flex; align-items: center; justify-content: space-between;
  }
  #attribution-panel .close-btn {
    background: none; border: none; cursor: pointer;
    color: #64748b; font-size: 12px; font-weight: 500;
    padding: 4px 8px; border-radius: 4px;
  }
  #attribution-panel .close-btn:hover { background: #f1f5f9; color: #1a1a2e; }
  #attribution-panel p {
    font-size: 12px; color: #334155; line-height: 1.5; margin: 0;
  }

  /* ── Controls cluster top-left ── */
  .controls {
    position: fixed; top: 12px; left: 12px; z-index: 900;
    display: flex; align-items: center; gap: 6px;
  }
  .ctrl-btn {
    background: #fff; border: 1px solid #d1d5db;
    color: #334155; border-radius: 8px;
    padding: 7px 13px; font: 500 12px/1 'Inter', sans-serif;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    user-select: none;
  }
  .ctrl-btn:hover { background: #f8fafc; border-color: #94a3b8; }
  .ctrl-btn svg { width: 14px; height: 14px; }

  /* ── Toggle buttons: pill with indicator dot ── */
  .toggle-btn { position: relative; padding-left: 26px; }
  .toggle-btn::before {
    content: '';
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: #cbd5e1;
    transition: background .15s;
  }
  .toggle-btn.active { background: #f0fdf4; border-color: #86efac; color: #166534; }
  .toggle-btn.active::before { background: #22c55e; }

  /* ── Settings panel ── */
  #settings-panel {
    position: fixed; top: 50px; left: 12px;
    width: 310px;
    max-height: calc(100vh - 64px);
    overflow-y: auto;
    background: #fff;
    z-index: 800;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.14);
    padding: 18px 20px 22px;
    transform-origin: top left;
    transform: scale(0);
    opacity: 0;
    transition: transform .2s cubic-bezier(.4,0,.2,1), opacity .15s ease;
    pointer-events: none;
  }
  #settings-panel.open {
    transform: scale(1);
    opacity: 1;
    pointer-events: auto;
  }

  #settings-panel .panel-header {
    margin: 0 0 14px; font-size: 14px; font-weight: 600; color: #1a1a2e;
    display: flex; align-items: center; justify-content: space-between;
  }
  #settings-panel .close-btn {
    background: none; border: none; cursor: pointer;
    color: #64748b; font-size: 12px; font-weight: 500;
    padding: 4px 8px; border-radius: 4px;
  }
  #settings-panel .close-btn:hover { background: #f1f5f9; color: #1a1a2e; }

  /* ── Mode switcher (Ridescore vs Custom) ── */
  .mode-switcher {
    display: flex; border-radius: 6px; overflow: hidden;
    border: 1px solid #e2e8f0; margin-bottom: 16px;
  }
  .mode-switcher button {
    flex: 1; padding: 8px 0;
    font: 500 12px/1 'Inter', sans-serif;
    border: none; cursor: pointer;
    background: #fff; color: #64748b;
    transition: all .15s;
  }
  .mode-switcher button.selected {
    background: #1a1a2e; color: #fff;
  }
  .mode-switcher button:not(.selected):hover { background: #f8fafc; }

  /* ── Slider rows ── */
  .slider-group { display: flex; flex-direction: column; gap: 14px; }
  .slider-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 4px;
    transition: opacity .15s;
  }
  .slider-row label {
    font-size: 12px; font-weight: 500; color: #334155;
  }
  .slider-row .val {
    font-size: 11px; font-weight: 600; color: #1a1a2e;
    text-align: right;
    min-width: 48px;
  }
  .slider-row input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 5px;
    background: #e2e8f0; border-radius: 3px; outline: none;
    grid-column: 1 / -1;
    margin-top: 2px;
    transition: opacity .15s;
  }
  .slider-row input[type="range"]:disabled { opacity: .3; cursor: default; }
  .slider-row.disabled { opacity: .35; }

  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: #1a1a2e; border-radius: 50%;
    cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  .slider-row input[type="range"]:disabled::-webkit-slider-thumb { cursor: default; background: #94a3b8; }
  .slider-row input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: #1a1a2e; border-radius: 50%;
    cursor: pointer; border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.25);
  }
  .slider-row input[type="range"]:disabled::-moz-range-thumb { cursor: default; background: #94a3b8; }

  .ridescore-note {
    font-size: 11px; color: #64748b; line-height: 1.4;
    margin-bottom: 4px; padding: 8px 10px;
    background: #f8fafc; border-radius: 6px;
  }

  #updateBtn {
    margin-top: 16px; width: 100%;
    padding: 10px; border: none; border-radius: 6px;
    background: #1a1a2e; color: #fff;
    font: 600 13px/1 'Inter', sans-serif;
    cursor: pointer; transition: background .15s;
  }
  #updateBtn:hover { background: #2d2d4e; }

  /* ── Map ── */
  #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

  /* ── Popup override ── */
  .maplibregl-popup { max-width: 320px; font: 12px/18px 'Inter', sans-serif; }
  .maplibregl-popup-content { padding: 12px 14px; border-radius: 8px; }
</style>
</head>
<body>

<!-- ── Logo top-right ── -->
<button id="logo-box" onclick="toggleAttribution()">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>
  DC Bike Safety
</button>

<!-- ── Attribution panel ── -->
<div id="attribution-panel">
  <div class="panel-header">
    Data Sources
    <button class="close-btn" onclick="toggleAttribution()">Close &times;</button>
  </div>
  <p>Imagery as well as road and crash source data from <strong>Washington D.C. Government</strong>, licensed under <strong>CC-BY-4.0</strong>.</p>
</div>

<!-- ── Control buttons top-left ── -->
<div class="controls">
  <button class="ctrl-btn" id="settingsBtn" onclick="toggleSettings()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </button>
  <button class="ctrl-btn toggle-btn" id="imageryBtn" onclick="toggleImagery()">
    Imagery
  </button>
  <button class="ctrl-btn toggle-btn" id="accidentsBtn" onclick="toggleAccidents()">
    Accidents
  </button>
</div>

<!-- ── Settings panel ── -->
<div id="settings-panel">
  <div class="panel-header">
    Your Priority
    <button class="close-btn" onclick="toggleSettings()">Close &times;</button>
  </div>

  <div class="mode-switcher">
    <button id="mode-ridescore" class="selected" onclick="setMode('ridescore')">Use RideScore</button>
    <button id="mode-custom" onclick="setMode('custom')">Custom</button>
  </div>

  <div class="ridescore-note" id="ridescore-note">Using the pre-computed safety score. Switch to Custom to tune individual weights.</div>

  <div class="slider-group" id="slider-group">

    <div class="slider-row disabled" id="row_speedlimit">
      <label>Speed Limit</label>
      <span class="val" id="v_speedlimit">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_speedlimit" disabled oninput="updateLabel('v_speedlimit', this.value)">
    </div>

    <div class="slider-row disabled" id="row_numlanes">
      <label>Number of Lanes</label>
      <span class="val" id="v_numlanes">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_numlanes" disabled oninput="updateLabel('v_numlanes', this.value)">
    </div>

    <div class="slider-row disabled" id="row_facility">
      <label>Bike Lane Type</label>
      <span class="val" id="v_facility">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_facility" disabled oninput="updateLabel('v_facility', this.value)">
    </div>

    <div class="slider-row disabled" id="row_function">
      <label>Road Type</label>
      <span class="val" id="v_function">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_function" disabled oninput="updateLabel('v_function', this.value)">
    </div>

    <div class="slider-row disabled" id="row_roadwidth">
      <label>Road Width</label>
      <span class="val" id="v_roadwidth">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_roadwidth" disabled oninput="updateLabel('v_roadwidth', this.value)">
    </div>

    <div class="slider-row disabled" id="row_pavement">
      <label>Pavement Condition</label>
      <span class="val" id="v_pavement">Medium</span>
      <input type="range" min="0" max="3" value="2" id="i_pavement" disabled oninput="updateLabel('v_pavement', this.value)">
    </div>
  </div>

  <button id="updateBtn">Update Map</button>
</div>

<div id="map"></div>

<script>
/* ── Value labels ── */
const LABELS = ['Off', 'Low', 'Medium', 'High'];
function updateLabel(spanId, val) {
  document.getElementById(spanId).textContent = LABELS[val];
}

/* ── Mode: RideScore vs Custom ── */
let currentMode = 'ridescore';
const sliderIds = ['speedlimit', 'numlanes', 'facility', 'function', 'roadwidth', 'pavement'];

function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-ridescore').classList.toggle('selected', mode === 'ridescore');
  document.getElementById('mode-custom').classList.toggle('selected', mode === 'custom');
  document.getElementById('ridescore-note').style.display = mode === 'ridescore' ? 'block' : 'none';

  sliderIds.forEach(id => {
    const row = document.getElementById('row_' + id);
    const input = document.getElementById('i_' + id);
    if (mode === 'custom') {
      row.classList.remove('disabled');
      input.disabled = false;
    } else {
      row.classList.add('disabled');
      input.disabled = true;
    }
  });
}

/* ── UI toggles ── */
let settingsOpen = false;
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settings-panel').classList.toggle('open', settingsOpen);
}

let attributionOpen = false;
function toggleAttribution() {
  attributionOpen = !attributionOpen;
  document.getElementById('attribution-panel').classList.toggle('open', attributionOpen);
}

let imageryOn = false;
function toggleImagery() {
  imageryOn = !imageryOn;
  document.getElementById('imageryBtn').classList.toggle('active', imageryOn);
  map.setLayoutProperty('ortho-2025-layer', 'visibility', imageryOn ? 'visible' : 'none');
}

let accidentsOn = false;
function toggleAccidents() {
  accidentsOn = !accidentsOn;
  document.getElementById('accidentsBtn').classList.toggle('active', accidentsOn);
  map.setLayoutProperty('crashes_dc_heatmap', 'visibility', accidentsOn ? 'visible' : 'none');
  map.setLayoutProperty('crashes_dc', 'visibility', accidentsOn ? 'visible' : 'none');
}

/* ── Slider refs & update ── */
const speedlimit_slider = document.getElementById('i_speedlimit');
const numlanes_slider = document.getElementById('i_numlanes');
const facility_slider = document.getElementById('i_facility');
const function_slider = document.getElementById('i_function');
const roadwidth_slider = document.getElementById('i_roadwidth');
const pavement_slider = document.getElementById('i_pavement');

document.getElementById('updateBtn').addEventListener('click', () => {
  if (currentMode === 'ridescore') {
    RefreshZone(4, 0, 0, 0, 0, 0, 0);
  } else {
    RefreshZone(
      0, speedlimit_slider.value, numlanes_slider.value,
      facility_slider.value, function_slider.value,
      roadwidth_slider.value, pavement_slider.value
    );
  }
});

function RefreshZone(i_ridescore, i_speedlimit, i_numlanes, i_facility, i_function, i_roadwidth, i_pavement) {
  const timestamp = Date.now();
  const source = map.getSource('my-vector-source');
  source.setTiles([`http://digitalocean_ip:3000/update_score/{z}/{x}/{y}?i_ridescore=${i_ridescore}&i_speedlimit=${i_speedlimit}&i_numlanes=${i_numlanes}&i_facility=${i_facility}&i_function=${i_function}&i_roadwidth=${i_roadwidth}&i_pavement=${i_pavement}&ts=${timestamp}`]);
  console.log('Refreshed');
}

/* ── Map ── */
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/bright',
  center: [-77.02515, 38.91668],
  zoom: 15
});

map.on('style.load', () => {

  map.addSource('dc-ortho-2025', {
    type: 'raster',
    tiles: ['https://maps2.dcgis.dc.gov/dcgis/rest/services/DCGIS_DATA/Ortho2025_WebMercator/MapServer/tile/{z}/{y}/{x}'],
    tileSize: 256
  });
  map.addLayer({
    id: 'ortho-2025-layer', type: 'raster', source: 'dc-ortho-2025',
    layout: { visibility: 'none' }
  });

  map.addSource('my-vector-source', {
    type: 'vector',
    tiles: ["http://digitalocean_ip:3000/update_score/{z}/{x}/{y}?i_ridescore=4&i_speedlimit=0&i_numlanes=0&i_facility=0&i_function=0&i_roadwidth=0&i_pavement=0"],
    minzoom: 1, maxzoom: 14
  });
  map.addLayer({
    id: 'update_score', type: 'line',
    source: 'my-vector-source', 'source-layer': 'update_score',
    paint: {
      'line-color': ['interpolate', ['linear'], ['get', 'user_score'],
        0, '#CC3232', 50, '#E7B416', 100, '#2DC937'],
      'line-width': 3
    }
  });

        map.addSource('points-source', {
	    type: 'vector',
	    tiles: [ //set following values to defaults in slider?
  "http://digitalocean_ip:3000/crashes_dc/{z}/{x}/{y}"
],
	    minzoom: 1,
	    maxzoom: 14
	});


    map.addLayer({
        'id': 'crashes_dc',
        'type': 'circle',
        'source': 'points-source',
    	'source-layer': 'crashes_dc',
	'minzoom': 15,
        'paint': {
            'circle-radius': 4,
            'circle-color': '#CC3232',
            'circle-stroke-width': 2,
            'circle-stroke-color': '#ffffff',
	    'circle-opacity': 0.7
        },
    	'layout': { visibility: 'none' },
    });

        map.addLayer(
            {
		'layout': { visibility: 'none' },
                'id': 'crashes_dc_heatmap',
                'type': 'heatmap',
                'source': 'points-source',
		'source-layer': 'crashes_dc',
                //'maxzoom': 9,
                'paint': {
                    // Increase the heatmap weight based on frequency and property magnitude
                    'heatmap-weight': [
                        'interpolate',
                        ['linear'],
  			['+', ['get', 'MAJORINJURIES_BICYCLIST'], ['*', ['get', 'FATAL_BICYCLIST'], 5]],
                        0, 0,
                        20, 1
                    ],
                    // Increase the heatmap color weight weight by zoom level
                    // heatmap-intensity is a multiplier on top of heatmap-weight
                    'heatmap-intensity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        0, 1,
                        15, 3
                    ],
                    // Color ramp for heatmap.  Domain is 0 (low) to 1 (high).
                    // Begin color ramp at 0-stop with a 0-transparency color
                    // to create a blur-like effect.
                    'heatmap-color': [
                        'interpolate',
                        ['linear'],
                        ['heatmap-density'],
                        0,
                        'rgba(33,102,172,0)',
                        0.2,
                        'rgb(103,169,207)',
                        0.4,
                        'rgb(209,229,240)',
                        0.6,
                        'rgb(253,219,199)',
                        0.8,
                        'rgb(239,138,98)',
                        1,
                        'rgb(178,24,43)'
                    ],
                    // Adjust the heatmap radius by zoom level
                    'heatmap-radius': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
                        0, 2,
			9, 3,
                        15, 15
                    ],
                    // Transition from heatmap to circle layer by zoom level
                    'heatmap-opacity': [
                        'interpolate',
                        ['linear'],
                        ['zoom'],
			0, 0.2,
			8, 0.2,
                        12, 1,
                        18, 0
                    ]
                }
            }
        );

  /* ── Popup on click ── */
  map.on('click', 'update_score', (e) => {
    const p = e.features[0].properties;
    const html = `
      <div style="font-family:'Inter',sans-serif">
        <strong style="font-size:13px">${p.route_name || 'Unnamed Road'}</strong>
        <table style="margin-top:6px;font-size:11px;border-collapse:collapse;width:100%">
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Safety Score</td><td><strong>${p.user_score}</strong></td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">RideScore</td><td>${p.ridescore_v1}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">LTS</td><td>${p.lts_level}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Bike Lane</td><td>${p.bike_facility_type}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Crashes (5yr)</td><td>${p.crash_count_5yr}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Speed Limit</td><td>${p.speed_limit_raw} mph</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Lanes</td><td>${p.num_lanes_raw}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Road Width</td><td>${p.road_width} ft</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Road Type</td><td>${p.function}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Pavement</td><td>${p.pavement_condition}</td></tr>
        </table>
      </div>`;
    new maplibregl.Popup().setLngLat(e.lngLat).setHTML(html).addTo(map);
  });

  map.on('mouseenter', 'update_score', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'update_score', () => { map.getCanvas().style.cursor = ''; });

  map.on('click', 'crashes_dc', (e) => {
    const p = e.features[0].properties;
    const html = `
      <div style="font-family:'Inter',sans-serif">
        <strong style="font-size:13px">Accident Summary</strong>
        <table style="margin-top:6px;font-size:11px;border-collapse:collapse;width:100%">
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Address</td><td><strong>${p.address}</strong></td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Date and time</td><td>${p.reportdate_}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Bicyclist fatalities</td><td>${p.fatal_bicyclist}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Bicyclist major injuries</td><td>${p.majorinjuries_bicyclist}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Bicyclist minor injuries</td><td>${p.minorinjuries_bicyclist}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Total bicycles involved</td><td>${p.total_bicycles}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0">Total vehicles involved</td><td>${p.total_vehicles}</td></tr>
          <tr><td style="color:#64748b;padding:2px 8px 2px 0"> Total pedestrians involved</td><td>${p.total_pedestrians}</td></tr>
        </table>
      </div>`;
    new maplibregl.Popup({maxWidth:'400px'}).setLngLat(e.lngLat).setHTML(html).addTo(map);
  });

  map.on('mouseenter', 'crashes_dc', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'crashes_dc', () => { map.getCanvas().style.cursor = ''; });




});
